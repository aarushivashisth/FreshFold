<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshFold - Sign Up</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PTTBWRGCW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4PTTBWRGCW');
  </script>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: url("Cream and Brown Photographic Beauty Site Launch Website.png") no-repeat center center/cover;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #5a3a32;
    }

    .signup-box {
      background: rgba(255, 255, 255, 0.85);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 340px;
    }

    .signup-box h2 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #3c2620;
      font-weight: bold;
    }

    .signup-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    .signup-box input:focus {
      border-color: #a67c68;
      box-shadow: 0 0 5px #a67c68;
    }

    .signup-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #5a3a32;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .signup-box button:hover {
      background: #3c2620;
      transform: scale(1.05);
    }

    .signup-box p {
      margin-top: 15px;
      font-size: 14px;
    }

    .signup-box a {
      color: #5a3a32;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-box a:hover {
      color: #3c2620;
    }
  </style>
</head>
<body>

  <div class="signup-box">
    <h2>Create Account</h2>
    <form onsubmit="return registerUser()">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="password" id="password" placeholder="Password" required minlength="4">
      <input type="text" id="phone" placeholder="Phone">
      <input type="text" id="address" placeholder="Address">
      <button type="button" onclick="registerUser()">Sign Up</button>
    </form>
    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
// ✅ Change this to your deployed backend URL for production
// Example: const API_BASE_URL = "https://freshfold-backend.onrender.com";
// Leave empty ("") when frontend is served by the same backend server
const API_BASE_URL = "https://freshfold-production.up.railway.app";

async function registerUser() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  // Client-side validation
  if (!name || !email || !username || !password) {
    alert("⚠ Please fill in all required fields (Name, Email, Username, Password).");
    return false;
  }

  try {
    const res = await fetch(API_BASE_URL + "/api/users/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, username, password, phone, address })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Registration failed");
      return false;
    }

    alert("✅ Account created successfully! Please login.");

    // GA4: Track user registration (after successful API response)
    gtag('event', 'user_registration', {
      method: 'form_signup'
    });

    window.location.href = "login.html";
  } catch (err) {
    console.error("Registration error:", err);
    alert("❌ Unable to connect to the server. Please check your internet connection or try again later.");
  }

  return false;
}
</script>


</body>
</html>
